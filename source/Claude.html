<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claude</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

  <!-- Runtime dependencies -->
  <script src="https://js.puter.com/v2/"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

  <style>
    /* ── TOKENS ──────────────────────────────────────────────────────── */
    :root {
      --bg:             #FAF9F6;
      --bg-sidebar:     #EFECE7;
      --bg-sidebar-hov: #E7E2D8;
      --bg-sidebar-act: #DEDAD0;
      --bg-user-msg:    #EDE8DF;
      --bg-input:       #FFFFFF;
      --bg-code:        #1B1815;
      --bg-code-hdr:    #252018;

      --text:           #1C1916;
      --text-2:         #6A6460;
      --text-3:         #9E9890;
      --accent:         #C96F3E;
      --accent-hov:     #AE5A28;
      --border:         #E5DFD8;
      --border-input:   #D9D3CC;
      --border-focus:   #C96F3E;

      --ic-bg:          #F0ECE7;
      --ic-text:        #C05030;
      --code-str:       #98C379;
      --scrollbar:      rgba(0,0,0,.10);

      --r-sm:  6px;
      --r-md:  10px;
      --r-lg:  16px;
      --r-xl:  22px;
      --r-inf: 9999px;

      --sidebar-w: 256px;
      --content-w: 700px;

      --font: 'Inter', ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      --mono: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;

      --ease: 160ms ease;
      --sh-sm: 0 1px 3px rgba(0,0,0,.07);
      --sh-md: 0 4px 14px rgba(0,0,0,.10);
      --sh-lg: 0 8px 28px rgba(0,0,0,.13);
    }

    /* ── RESET ───────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: var(--font);
      font-size: 15px;
      line-height: 1.6;
      color: var(--text);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
    }
    button, input, textarea { font-family: inherit; color: inherit; }
    button { cursor: pointer; border: none; background: none; }
    textarea { resize: none; outline: none; border: none; background: none; }
    a { color: inherit; text-decoration: none; }

    /* ── SCROLLBAR ───────────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: var(--r-inf); }
    ::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,.18); }

    /* ── APP SHELL ───────────────────────────────────────────────────── */
    #app {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ── SIDEBAR ─────────────────────────────────────────────────────── */
    #sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header */
    .sb-header {
      padding: 14px 12px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .sb-logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -.01em;
      color: var(--text);
    }
    .sb-logo-icon { width: 26px; height: 26px; color: var(--accent); flex-shrink: 0; }

    .icon-btn {
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--r-md);
      color: var(--text-2);
      transition: background var(--ease), color var(--ease);
    }
    .icon-btn:hover { background: var(--bg-sidebar-hov); color: var(--text); }
    .icon-btn svg { width: 17px; height: 17px; }

    /* Nav items */
    .sb-nav { padding: 2px 8px 6px; }
    .sb-nav-item {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 6px 8px;
      border-radius: var(--r-md);
      font-size: 13.5px;
      font-weight: 500;
      color: var(--text-2);
      cursor: pointer;
      transition: background var(--ease), color var(--ease);
    }
    .sb-nav-item:hover { background: var(--bg-sidebar-hov); color: var(--text); }
    .sb-nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }

    .sb-divider { height: 1px; background: var(--border); margin: 4px 12px; }

    /* Conversation list */
    #sb-convs {
      flex: 1;
      overflow-y: auto;
      padding: 6px 8px;
      min-height: 0;
    }
    .conv-group-label {
      font-size: 10.5px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--text-3);
      padding: 8px 8px 3px;
    }
    .conv-item {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 6px 8px;
      border-radius: var(--r-md);
      font-size: 13px;
      color: var(--text-2);
      cursor: pointer;
      transition: background var(--ease), color var(--ease);
    }
    .conv-item:hover { background: var(--bg-sidebar-hov); color: var(--text); }
    .conv-item.active { background: var(--bg-sidebar-act); color: var(--text); }
    .conv-item svg { width: 14px; height: 14px; flex-shrink: 0; color: var(--text-3); }
    .conv-title { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }

    #conv-empty {
      padding: 18px 8px;
      text-align: center;
      font-size: 13px;
      color: var(--text-3);
    }

    /* Footer */
    .sb-footer {
      padding: 10px 12px;
      border-top: 1px solid var(--border);
    }
    .sb-user {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 5px 6px;
      border-radius: var(--r-md);
      cursor: pointer;
      transition: background var(--ease);
    }
    .sb-user:hover { background: var(--bg-sidebar-hov); }
    .sb-avatar {
      width: 28px;
      height: 28px;
      border-radius: 7px;
      background: var(--accent);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .sb-user-info { flex: 1; min-width: 0; }
    .sb-user-name { font-size: 13px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .sb-user-sub { font-size: 11.5px; color: var(--text-3); }

    /* ── MAIN AREA ───────────────────────────────────────────────────── */
    #main {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .screen { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .screen.hidden { display: none; }

    /* ── WELCOME SCREEN ──────────────────────────────────────────────── */
    #welcome {
      align-items: center;
      justify-content: center;
    }
    #welcome-inner {
      width: 100%;
      max-width: 660px;
      padding: 40px 24px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
    }
    .w-hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }
    .w-logo { width: 44px; height: 44px; color: var(--accent); }
    .w-greeting {
      font-size: 28px;
      font-weight: 600;
      letter-spacing: -.025em;
      color: var(--text);
      text-align: center;
    }

    /* ── INPUT BOX ───────────────────────────────────────────────────── */
    .input-shell { width: 100%; }
    .input-box {
      background: var(--bg-input);
      border: 1.5px solid var(--border-input);
      border-radius: var(--r-xl);
      box-shadow: var(--sh-sm);
      transition: border-color var(--ease), box-shadow var(--ease);
      overflow: hidden;
    }
    .input-box:focus-within {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px rgba(201,111,62,.12), var(--sh-sm);
    }
    .input-ta {
      display: block;
      width: 100%;
      padding: 14px 16px 10px;
      font-size: 15px;
      line-height: 1.55;
      max-height: 200px;
      overflow-y: auto;
      color: var(--text);
    }
    .input-ta::placeholder { color: var(--text-3); }
    .input-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 8px 8px;
      gap: 6px;
    }
    .input-left { display: flex; align-items: center; gap: 4px; }

    /* Model chip inside toolbar */
    .model-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px 4px 8px;
      border-radius: var(--r-inf);
      font-size: 12.5px;
      font-weight: 500;
      color: var(--text-2);
      border: 1px solid transparent;
      transition: background var(--ease), color var(--ease), border-color var(--ease);
    }
    .model-chip:hover { background: var(--bg-sidebar-hov); color: var(--text); border-color: var(--border); }
    .model-chip svg { width: 14px; height: 14px; flex-shrink: 0; }

    /* Send button */
    .send-btn {
      width: 32px;
      height: 32px;
      border-radius: var(--r-inf);
      background: var(--accent);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background var(--ease), opacity var(--ease), transform var(--ease);
    }
    .send-btn:hover:not(:disabled) { background: var(--accent-hov); transform: scale(1.06); }
    .send-btn:disabled { background: var(--border); cursor: default; }
    .send-btn svg { width: 15px; height: 15px; position: relative; left: 1px; }

    /* Puter auth strip */
    #auth-strip {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 10px;
    }
    #auth-btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 7px 16px;
      border-radius: var(--r-inf);
      font-size: 12.5px;
      font-weight: 500;
      color: var(--accent);
      background: rgba(201,111,62,.08);
      border: 1px solid rgba(201,111,62,.22);
      transition: background var(--ease), border-color var(--ease);
    }
    #auth-btn:hover { background: rgba(201,111,62,.15); }
    #auth-btn svg { width: 13px; height: 13px; flex-shrink: 0; }
    #auth-btn.ok { color: #2a7a3b; background: rgba(42,122,59,.08); border-color: rgba(42,122,59,.2); }
    #auth-btn.hidden-chip { display: none; }

    /* Suggestion chips */
    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }
    .sug-chip {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 8px 16px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--r-inf);
      font-size: 13px;
      color: var(--text-2);
      box-shadow: var(--sh-sm);
      transition: border-color var(--ease), box-shadow var(--ease), color var(--ease);
    }
    .sug-chip:hover { border-color: var(--accent); color: var(--text); box-shadow: var(--sh-md); }
    .sug-chip svg { width: 14px; height: 14px; color: var(--accent); flex-shrink: 0; }

    /* ── CHAT SCREEN ─────────────────────────────────────────────────── */
    #chat { position: relative; }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 0 0;
    }
    #messages-inner {
      max-width: var(--content-w);
      margin: 0 auto;
      padding: 0 24px 16px;
    }

    #chat-input-wrap {
      padding: 0 20px 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    #chat-input-wrap .input-shell { max-width: var(--content-w); }

    .input-footer-note {
      margin-top: 7px;
      text-align: center;
      font-size: 11.5px;
      color: var(--text-3);
    }

    /* ── MESSAGES ────────────────────────────────────────────────────── */
    .msg { width: 100%; padding: 4px 0; }

    /* User bubble */
    .msg-user { display: flex; justify-content: flex-end; padding: 6px 0 10px; }
    .user-bubble {
      background: var(--bg-user-msg);
      color: var(--text);
      border-radius: 18px 18px 4px 18px;
      padding: 11px 16px;
      max-width: 86%;
      font-size: 15px;
      line-height: 1.55;
      word-wrap: break-word;
      white-space: pre-wrap;
    }

    /* Assistant message */
    .msg-ai { padding: 8px 0 14px; }

    .ai-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .ai-icon { width: 20px; height: 20px; color: var(--accent); flex-shrink: 0; }
    .ai-label { font-size: 13px; font-weight: 600; color: var(--text-2); }

    .ai-body {
      padding-left: 28px;
      font-size: 15px;
      line-height: 1.65;
      color: var(--text);
    }

    /* Streaming text (pre-markdown-render state) */
    .stream-text {
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* Blinking cursor during stream */
    .stream-cursor {
      display: inline-block;
      width: 2px;
      height: .95em;
      background: var(--text-2);
      margin-left: 1px;
      vertical-align: text-bottom;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0; } }
    @keyframes spin  { from { transform:rotate(0deg); } to { transform:rotate(360deg); } }

    /* Message action bar */
    .msg-actions {
      display: flex;
      gap: 2px;
      padding-left: 28px;
      margin-top: 4px;
      opacity: 0;
      transition: opacity var(--ease);
    }
    .msg-ai:hover .msg-actions { opacity: 1; }

    .msg-act-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 8px;
      border-radius: var(--r-sm);
      font-size: 12px;
      color: var(--text-3);
      transition: background var(--ease), color var(--ease);
    }
    .msg-act-btn:hover { background: var(--bg-sidebar-hov); color: var(--text-2); }
    .msg-act-btn svg { width: 13px; height: 13px; }

    /* ── TYPING INDICATOR ────────────────────────────────────────────── */
    #typing-ind {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 8px 0 14px 28px;
    }
    #typing-ind.on { display: flex; }
    .t-dots { display: flex; gap: 4px; }
    .t-dot {
      width: 7px;
      height: 7px;
      background: var(--text-3);
      border-radius: 50%;
      animation: pulse 1.4s ease-in-out infinite;
    }
    .t-dot:nth-child(1) { animation-delay: 0s; }
    .t-dot:nth-child(2) { animation-delay: .18s; }
    .t-dot:nth-child(3) { animation-delay: .36s; }
    @keyframes pulse {
      0%,60%,100% { transform: scale(.7); opacity: .4; }
      30% { transform: scale(1.1); opacity: 1; }
    }

    /* ── MARKDOWN PROSE ─────────────────────────────────────────────── */
    .prose { line-height: 1.65; }
    .prose > *:first-child { margin-top: 0 !important; }
    .prose > *:last-child  { margin-bottom: 0 !important; }

    .prose p   { margin: 0 0 12px; }
    .prose h1  { font-size: 22px; font-weight: 700; margin: 22px 0 9px; letter-spacing: -.025em; }
    .prose h2  { font-size: 18px; font-weight: 700; margin: 18px 0 7px; letter-spacing: -.015em; }
    .prose h3  { font-size: 16px; font-weight: 600; margin: 16px 0 6px; }
    .prose h4,.prose h5,.prose h6 { font-size: 15px; font-weight: 600; margin: 14px 0 5px; }
    .prose strong  { font-weight: 600; }
    .prose em      { font-style: italic; }
    .prose ul      { margin: 6px 0 12px; padding-left: 22px; list-style: disc; }
    .prose ol      { margin: 6px 0 12px; padding-left: 22px; list-style: decimal; }
    .prose li      { margin: 5px 0; line-height: 1.6; }
    .prose li > ul,
    .prose li > ol { margin: 4px 0; }
    .prose hr      { border: none; border-top: 1px solid var(--border); margin: 22px 0; }
    .prose a       { color: var(--accent); text-decoration: underline; text-underline-offset: 2px; }
    .prose a:hover { color: var(--accent-hov); }

    .prose blockquote {
      border-left: 3px solid var(--accent);
      margin: 14px 0;
      padding: 6px 0 6px 16px;
      color: var(--text-2);
    }

    .prose table   { width: 100%; border-collapse: collapse; margin: 14px 0; font-size: 14px; }
    .prose th      { background: var(--ic-bg); font-weight: 600; text-align: left; padding: 8px 12px; border: 1px solid var(--border); }
    .prose td      { padding: 7px 12px; border: 1px solid var(--border); }
    .prose tr:nth-child(even) td { background: rgba(0,0,0,.02); }

    /* Inline code */
    .prose code:not([class]) {
      font-family: var(--mono);
      font-size: 13.5px;
      background: var(--ic-bg);
      color: var(--ic-text);
      padding: 2px 5px;
      border-radius: 4px;
    }

    /* ── CODE BLOCKS ────────────────────────────────────────────────── */
    .code-block {
      margin: 14px 0;
      border-radius: var(--r-lg);
      overflow: hidden;
      background: var(--bg-code);
      color: #fff;
      border: 1px solid rgba(255,255,255,.05);
    }
    .code-hdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg-code-hdr);
      padding: 8px 14px;
      border-bottom: 1px solid rgba(255,255,255,.05);
    }
    .code-lang {
      font-family: var(--mono);
      font-size: 11.5px;
      color: rgba(255,255,255,.4);
      text-transform: lowercase;
      letter-spacing: .02em;
    }
    .code-copy {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      color: rgba(255,255,255,.4);
      padding: 2px 8px;
      border-radius: 5px;
      transition: background var(--ease), color var(--ease);
    }
    .code-copy:hover { background: rgba(255,255,255,.08); color: rgba(255,255,255,.75); }
    .code-copy.copied { color: #6cdb85; }
    .code-copy svg { width: 12px; height: 12px; }

    .code-block pre {
      margin: 0;
      padding: 14px 16px;
      overflow-x: auto;
      background: transparent !important;
    }
    .code-block pre code.hljs {
      background: transparent !important;
      font-family: var(--mono);
      font-size: 13.5px;
      line-height: 1.6;
      padding: 0;
    }
    /* Override any hljs theme background */
    .hljs { background: transparent !important; }

    /* ── MODEL DROPDOWN ──────────────────────────────────────────────── */
    #model-dd {
      position: fixed;
      z-index: 2000;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 6px;
      min-width: 230px;
      box-shadow: var(--sh-lg);
      display: none;
    }
    #model-dd.open { display: block; }

    .dd-group-label {
      font-size: 10.5px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--text-3);
      padding: 8px 10px 4px;
    }
    .dd-option {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding: 7px 10px;
      border-radius: var(--r-md);
      font-size: 13.5px;
      color: var(--text-2);
      transition: background var(--ease), color var(--ease);
    }
    .dd-option:hover { background: var(--bg-sidebar-hov); color: var(--text); }
    .dd-option.active { color: var(--accent); font-weight: 600; }
    .dd-check { width: 14px; height: 14px; flex-shrink: 0; color: var(--accent); }

    /* ── TOAST ──────────────────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 72px;
      left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: var(--text);
      color: #fff;
      padding: 7px 16px;
      border-radius: var(--r-inf);
      font-size: 13px;
      pointer-events: none;
      opacity: 0;
      transition: all .22s ease;
      z-index: 3000;
      white-space: nowrap;
      box-shadow: var(--sh-md);
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── ANIMATIONS ─────────────────────────────────────────────────── */
    @keyframes msg-in {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .msg { animation: msg-in .18s ease forwards; }

    /* ── RESPONSIVE ─────────────────────────────────────────────────── */
    @media (max-width: 640px) {
      #sidebar { display: none; }
    }
  </style>
</head>
<body>

  <!-- Model dropdown (portaled) -->
  <div id="model-dd"></div>

  <!-- Toast -->
  <div id="toast"></div>

  <div id="app">

    <!-- ════════════════════ SIDEBAR ════════════════════ -->
    <aside id="sidebar">
      <div class="sb-header">
        <div class="sb-logo">
          <!-- Claude mark -->
          <svg class="sb-logo-icon" viewBox="0 0 24 24" fill="currentColor">

  <script>
  /* ════════════════════════════════════════════════════════════════════
     STATE
     ════════════════════════════════════════════════════════════════════ */
  /* Used only if puter.ai.listModels() is unreachable/unavailable/empty.
     Mirrors the four families+minimum versions we want registered. */
  const FALLBACK_MODELS = [
    { api:'claude-fable-5',    display:'Claude Fable 5',    short:'Fable 5',    group:'Claude 5',   familyKey:'fable'  },
    { api:'claude-opus-4-8',   display:'Claude Opus 4.8',   short:'Opus 4.8',   group:'Claude 4.8', familyKey:'opus'   },
    { api:'claude-sonnet-4-6', display:'Claude Sonnet 4.6', short:'Sonnet 4.6', group:'Claude 4.6', familyKey:'sonnet' },
    { api:'claude-haiku-4-5',  display:'Claude Haiku 4.5',  short:'Haiku 4.5',  group:'Claude 4.5', familyKey:'haiku'  },
  ];

  /* Mutable — replaced in place once puter.ai.listModels() resolves.
     Starts populated with the fallback set so the UI is never empty/blank. */
  let MODELS = FALLBACK_MODELS.slice();
  let userSelectedModel = false;

  const S = {
    model:       pickDefaultModel(MODELS),
    history:     [],
    convs:       [],
    activeConv:  null,
    streaming:   false,
    authed:      false,
  };

  /* ════════════════════════════════════════════════════════════════════
     DYNAMIC MODEL REGISTRY
     Populates MODELS from puter.ai.listModels() at runtime, keeping only:
       • Claude Fable  5   and onwards
       • Claude Opus   4.8 and onwards
       • Claude Sonnet 4.6 and onwards
       • Claude Haiku  4.5 and onwards
     Falls back to FALLBACK_MODELS above if the call fails, times out,
     returns nothing usable, or puter.ai isn't available at all.
     ════════════════════════════════════════════════════════════════════ */
  const MODEL_FAMILIES = {
    fable:  { label: 'Fable',  min: [5]    },
    opus:   { label: 'Opus',   min: [4, 8] },
    sonnet: { label: 'Sonnet', min: [4, 6] },
    haiku:  { label: 'Haiku',  min: [4, 5] },
  };

  /* 'fallback' | 'loading' | 'live' — drives the small status row in the dropdown */
  let MODELS_SOURCE = 'fallback';

  /* Prefer defaulting to the newest available Sonnet (best cost/capability
     balance); otherwise just take the newest model in the (sorted) list. */
  function pickDefaultModel(list) {
    const sonnet = list.find(m => m.familyKey === 'sonnet');
    return (sonnet || list[0]).api;
  }

  /* v/min are arrays like [4,8]. Returns true if v >= min, component-wise,
     left-to-right, treating missing trailing components as 0. */
  function versionGTE(v, min) {
    const len = Math.max(v.length, min.length);
    for (let i = 0; i < len; i++) {
      const a = v[i] || 0, b = min[i] || 0;
      if (a !== b) return a > b;
    }
    return true; // exactly equal
  }

  /* Given id parts like ['claude','opus','4','8'] and familyKey 'opus',
     returns [4,8]. Stops at the first non-numeric or long (e.g. date-suffix
     like '20251001') segment, so trailing snapshot dates don't get parsed
     as version components. Returns null if the family isn't present. */
  function extractFamilyVersion(idParts, familyKey) {
    const idx = idParts.indexOf(familyKey);
    if (idx === -1) return null;
    const ver = [];
    for (let i = idx + 1; i < idParts.length; i++) {
      if (/^\d{1,3}$/.test(idParts[i])) ver.push(parseInt(idParts[i], 10));
      else break;
    }
    return ver.length ? ver : null;
  }

  /* Turns one raw puter.ai.listModels() entry into our dropdown shape, or
     returns null if it isn't a Claude model in one of the four target
     families at/above the minimum version. */
  function classifyClaudeModel(raw) {
    const id = String(raw?.id || '').toLowerCase().trim();
    if (!id.startsWith('claude-')) return null;
    if (raw.provider && !/claude|anthropic/i.test(String(raw.provider))) return null;

    const parts = id.split('-');
    for (const familyKey of Object.keys(MODEL_FAMILIES)) {
      const cfg = MODEL_FAMILIES[familyKey];
      const ver = extractFamilyVersion(parts, familyKey);
      if (ver && versionGTE(ver, cfg.min)) {
        const verStr  = ver.join('.');
        return {
          api:       raw.id,
          display:   raw.name || `Claude ${cfg.label} ${verStr}`,
          short:     `${cfg.label} ${verStr}`,
          group:     `Claude ${ver.slice(0, 2).join('.')}`,
          familyKey,
          sortKey:   ver,
        };
      }
    }
    return null;
  }

  function withTimeout(promise, ms) {
    let timer;
    const timeout = new Promise((_, reject) => {
      timer = setTimeout(() => reject(new Error(`Timed out after ${ms}ms`)), ms);
    });
    return Promise.race([promise, timeout]).finally(() => clearTimeout(timer));
  }

  /* Tries the provider-scoped call first (smaller payload), then falls
     back to the unscoped call if that fails or comes back empty. */
  async function fetchRawModels() {
    if (typeof puter === 'undefined' || !puter.ai || typeof puter.ai.listModels !== 'function') {
      throw new Error('puter.ai.listModels() is not available in this environment');
    }
    let raw = null;
    try {
      raw = await withTimeout(puter.ai.listModels('claude'), 8000);
    } catch (err) {
      console.warn('listModels("claude") failed, will try unscoped:', err);
    }
    if (!Array.isArray(raw) || raw.length === 0) {
      raw = await withTimeout(puter.ai.listModels(), 8000);
    }
    if (!Array.isArray(raw)) throw new Error('listModels() returned a non-array response');
    return raw;
  }

  /* Classifies + dedupes (keeping the shortest id per family+version, since
     dated/"-latest" aliases are usually longer than the canonical id) +
     sorts newest-first. */
  function buildModelList(rawModels) {
    const byKey = new Map();
    rawModels.forEach(raw => {
      const model = classifyClaudeModel(raw);
      if (!model) return;
      const dedupeKey = `${model.familyKey}:${model.sortKey.join('.')}`;
      const existing = byKey.get(dedupeKey);
      if (!existing || model.api.length < existing.api.length) byKey.set(dedupeKey, model);
    });

    const list = [...byKey.values()];
    list.sort((a, b) => {
      for (let i = 0; i < 4; i++) {
        const av = a.sortKey[i] || 0, bv = b.sortKey[i] || 0;
        if (av !== bv) return bv - av; // newest first
      }
      return a.display.localeCompare(b.display);
    });
    return list;
  }

  /* Main entry point: fetches, classifies, and swaps MODELS in place.
     Retries once on failure, then gives up and keeps/restores the
     fallback list. Safe to call again later (e.g. a manual refresh). */
  async function loadModels({ silent = true } = {}) {
    MODELS_SOURCE = 'loading';
    const MAX_ATTEMPTS = 2;

    for (let attempt = 1; attempt <= MAX_ATTEMPTS; attempt++) {
      try {
        const raw = await fetchRawModels();
        const list = buildModelList(raw);
        if (list.length === 0) throw new Error('No matching Claude Fable/Opus/Sonnet/Haiku models found');

        MODELS = list;
        MODELS_SOURCE = 'live';
        if (!userSelectedModel) {
          S.model = pickDefaultModel(MODELS);
        } else if (!MODELS.find(m => m.api === S.model)) {
          S.model = pickDefaultModel(MODELS);
        }
        syncModelLabels();
        if (!silent) toast('Model list updated');
        return true;

      } catch (err) {
        console.warn(`loadModels() attempt ${attempt}/${MAX_ATTEMPTS} failed:`, err);
        if (attempt < MAX_ATTEMPTS) await new Promise(r => setTimeout(r, 500 * attempt));
      }
    }

    // Both attempts failed — fall back to the static list so the app stays usable.
    MODELS = FALLBACK_MODELS.slice();
    MODELS_SOURCE = 'fallback';
    if (!MODELS.find(m => m.api === S.model)) S.model = pickDefaultModel(MODELS);
    syncModelLabels();
    if (!silent) toast('Live model list unavailable — showing defaults');
    return false;
  }

  /* ════════════════════════════════════════════════════════════════════
     MARKDOWN / HIGHLIGHT SETUP
     ════════════════════════════════════════════════════════════════════ */
  function initMarkdown() {
    if (typeof marked === 'undefined' || typeof hljs === 'undefined') {
      return setTimeout(initMarkdown, 80);
    }

    const renderer = {
      code(code, lang) {
        // Handle object arg (some marked versions pass {text,lang})
        if (typeof code === 'object' && code !== null) {
          lang = code.lang || '';
          code = code.text || '';
        }
        const l = (lang || '').toLowerCase().trim();
        let hi = '';
        try {
          hi = l && hljs.getLanguage(l)
            ? hljs.highlight(code, { language: l }).value
            : hljs.highlightAuto(code).value;
        } catch(_) { hi = esc(code); }

        return `<div class="code-block">
  <div class="code-hdr">
    <span class="code-lang">${l || 'text'}</span>
    <button class="code-copy" data-code="${encodeURIComponent(code)}">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="9" width="13" height="13" rx="2"/>
        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
      </svg>
      Copy
    </button>
  </div>
  <pre><code class="hljs">${hi}</code></pre>
</div>`;
      }
    };

    marked.use({ renderer, breaks: true, gfm: true });
  }
  initMarkdown();

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function md(text) {
    try { return marked.parse(text); }
    catch(_) { return `<p>${esc(text)}</p>`; }
  }

  /* ════════════════════════════════════════════════════════════════════
     GREETING
     ════════════════════════════════════════════════════════════════════ */
  (function setGreeting() {
    const h = new Date().getHours();
    const g = h < 12 ? 'Good morning' : h < 17 ? 'Good afternoon' : 'Good evening';
    document.getElementById('welcome-greeting').textContent = `${g}, LegominerJ`;
  })();

  /* ════════════════════════════════════════════════════════════════════
     MODEL SELECTOR
     ════════════════════════════════════════════════════════════════════ */
  function currentModel() { return MODELS.find(m => m.api === S.model) || MODELS[0]; }

  function syncModelLabels() {
    const m = currentModel();
    document.getElementById('w-model-label').textContent = m.display;
    document.getElementById('c-model-label').textContent = m.short;
  }

  function buildDropdown() {
    const dd = document.getElementById('model-dd');
    dd.innerHTML = '';
    const groups = [...new Set(MODELS.map(m => m.group))];
    groups.forEach(grp => {
      const gl = document.createElement('div');
      gl.className = 'dd-group-label';
      gl.textContent = grp;
      dd.appendChild(gl);
      MODELS.filter(m => m.group === grp).forEach(model => {
        const btn = document.createElement('button');
        btn.className = 'dd-option' + (model.api === S.model ? ' active' : '');
        const isActive = model.api === S.model;
        btn.innerHTML = `
          <svg class="dd-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="${isActive ? '' : 'visibility:hidden'}">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
          ${model.display}`;
        btn.addEventListener('click', e => {
          e.stopPropagation();
          userSelectedModel = true;
          S.model = model.api;
          syncModelLabels();
          closeDD();
        });
        dd.appendChild(btn);
      });
    });

    dd.appendChild(Object.assign(document.createElement('div'), {
      className: 'sb-divider', style: 'margin:4px 6px;'
    }));

    const refreshBtn = document.createElement('button');
    refreshBtn.className = 'dd-option';
    refreshBtn.style.color = 'var(--text-3)';
    refreshBtn.disabled = MODELS_SOURCE === 'loading';
    const statusText = {
      loading:  'Loading live model list…',
      live:     'Refresh model list',
      fallback: 'Retry — showing defaults',
    }[MODELS_SOURCE];
    refreshBtn.innerHTML = `
      <svg class="dd-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="${MODELS_SOURCE === 'loading' ? 'animation:spin 1s linear infinite' : ''}">
        <polyline points="23 4 23 10 17 10"/>
        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
      </svg>
      ${statusText}`;
    refreshBtn.addEventListener('click', async e => {
      e.stopPropagation();
      await loadModels({ silent: false });
      buildDropdown();
    });
    dd.appendChild(refreshBtn);
  }

  function openDD(anchor) {
    buildDropdown();
    const dd = document.getElementById('model-dd');
    const r = anchor.getBoundingClientRect();
    // Position above the anchor
    dd.style.bottom = (window.innerHeight - r.top + 8) + 'px';
    dd.style.left   = r.left + 'px';
    dd.style.right  = 'auto';
    dd.classList.add('open');
  }
  function closeDD() { document.getElementById('model-dd').classList.remove('open'); }

  document.getElementById('w-model-btn').addEventListener('click', e => { e.stopPropagation(); openDD(e.currentTarget); });
  document.getElementById('c-model-btn').addEventListener('click', e => { e.stopPropagation(); openDD(e.currentTarget); });
  document.addEventListener('click', closeDD);

  /* ════════════════════════════════════════════════════════════════════
     AUTH
     ════════════════════════════════════════════════════════════════════ */
  const authBtn = document.getElementById('auth-btn');

  authBtn.addEventListener('click', async () => {
    authBtn.innerHTML = `
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="13" height="13">
        <path d="M21 12a9 9 0 1 1-9-9 9 9 0 0 1 9 9"/>
      </svg>
      Connecting…`;
    try {
      await puter.ai.chat('test', { model: S.model });
      S.authed = true;
      authBtn.className = 'ok';
      authBtn.innerHTML = `
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="13" height="13">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
        Connected`;
      setTimeout(() => authBtn.classList.add('hidden-chip'), 2400);
    } catch(err) {
      authBtn.innerHTML = `
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="13" height="13">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        Auth failed — try Incognito`;
      console.error('Puter auth failed:', err);
    }
  });

  /* Auto-auth notice for file:// protocol */
  if (location.protocol === 'file:') {
    authBtn.insertAdjacentHTML('afterbegin', '');
  }

  /* ════════════════════════════════════════════════════════════════════
     SCREEN MANAGEMENT
     ════════════════════════════════════════════════════════════════════ */
  function showWelcome() {
    document.getElementById('welcome').classList.remove('hidden');
    document.getElementById('chat').classList.add('hidden');
  }
  function showChat() {
    document.getElementById('welcome').classList.add('hidden');
    document.getElementById('chat').classList.remove('hidden');
  }

  /* ════════════════════════════════════════════════════════════════════
     INPUT HELPERS
     ════════════════════════════════════════════════════════════════════ */
  function autoResize(ta) {
    ta.style.height = 'auto';
    ta.style.height = Math.min(ta.scrollHeight, 200) + 'px';
  }

  function setEnabled(on) {
    ['welcome-input','chat-input','w-send-btn','c-send-btn'].forEach(id => {
      const el = document.getElementById(id);
      if (!el) return;
      el.disabled = !on;
      if (el.tagName === 'BUTTON') el.style.opacity = on ? '' : '.5';
    });
  }

  function wireInput(taId, btnId, onSend) {
    const ta  = document.getElementById(taId);
    const btn = document.getElementById(btnId);
    ta.addEventListener('input', () => {
      autoResize(ta);
      btn.disabled = !ta.value.trim();
    });
    ta.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        if (ta.value.trim()) onSend();
      }
    });
    btn.addEventListener('click', onSend);
  }

  wireInput('welcome-input', 'w-send-btn', handleWelcomeSend);
  wireInput('chat-input',    'c-send-btn', handleChatSend);

  /* Suggestion chips */
  document.querySelectorAll('.sug-chip').forEach(btn => {
    btn.addEventListener('click', () => {
      const ta = document.getElementById('welcome-input');
      ta.value = btn.dataset.prompt;
      autoResize(ta);
      document.getElementById('w-send-btn').disabled = false;
      ta.focus();
    });
  });

  /* New chat */
  document.getElementById('new-chat-btn').addEventListener('click', () => {
    S.history    = [];
    S.activeConv = null;
    resetMessagesDOM();
    showWelcome();
    setTimeout(() => document.getElementById('welcome-input').focus(), 30);
  });

  /* ════════════════════════════════════════════════════════════════════
     SEND FLOW
     ════════════════════════════════════════════════════════════════════ */
  async function handleWelcomeSend() {
    const ta = document.getElementById('welcome-input');
    const text = ta.value.trim();
    if (!text || S.streaming) return;
    ta.value = '';
    autoResize(ta);

    createConversation(text);
    showChat();
    addUserMsg(text);
    await callAPI(text);
  }

  async function handleChatSend() {
    const ta  = document.getElementById('chat-input');
    const btn = document.getElementById('c-send-btn');
    const text = ta.value.trim();
    if (!text || S.streaming) return;
    ta.value = '';
    autoResize(ta);
    btn.disabled = true;

    addUserMsg(text);
    await callAPI(text);
  }

  /* ════════════════════════════════════════════════════════════════════
     API CALL
     ════════════════════════════════════════════════════════════════════ */
  async function callAPI(text) {
    S.history.push({ role:'user', content:text });
    S.streaming = true;
    setEnabled(false);
    showTyping();

    try {
      const resp = await puter.ai.chat(S.history, {
        model:  S.model,
        stream: true
      });

      // puter.ai returns false-y on auth failure
      if (!resp) throw new Error('Puter auth required — click "Connect to Puter" first.');

      hideTyping();
      const { bodyEl } = addAIMsg();

      let full = '';
      let rafId = null;

      for await (const part of resp) {
        if (part?.text) {
          full += part.text;
          if (!rafId) {
            rafId = requestAnimationFrame(() => {
              bodyEl.innerHTML = `<span class="stream-text">${esc(full)}</span><span class="stream-cursor"></span>`;
              scrollBottom();
              rafId = null;
            });
          }
        }
      }

      // Final markdown render
      await new Promise(r => requestAnimationFrame(r));
      bodyEl.innerHTML = `<div class="prose">${md(full)}</div>`;
      scrollBottom();

      S.history.push({ role:'assistant', content:full });
      updateActiveConv();

    } catch(err) {
      console.error(err);
      hideTyping();
      addAIMsg(null, true, err.message || 'Something went wrong. Check your Puter connection.');
      if (S.history.at(-1)?.role === 'user') S.history.pop();
    } finally {
      S.streaming = false;
      setEnabled(true);
      document.getElementById('chat-input')?.focus();
    }
  }

  /* ════════════════════════════════════════════════════════════════════
     DOM: MESSAGES
     ════════════════════════════════════════════════════════════════════ */
  const TYPING_IND_ID = 'typing-ind';

  function addUserMsg(text) {
    const inner = document.getElementById('messages-inner');
    const div   = document.createElement('div');
    div.className = 'msg msg-user';
    div.innerHTML = `<div class="user-bubble">${esc(text)}</div>`;
    inner.insertBefore(div, document.getElementById(TYPING_IND_ID));
    scrollBottom();
  }

  function addAIMsg(content = null, isErr = false, errMsg = '') {
    const inner  = document.getElementById('messages-inner');
    const div    = document.createElement('div');
    div.className = 'msg msg-ai';

    const bodyEl = document.createElement('div');
    bodyEl.className = 'ai-body';

    if (isErr) {
      bodyEl.innerHTML = `<p style="color:#b94040;font-size:14px">${esc(errMsg)}</p>`;
    } else if (content) {
      bodyEl.innerHTML = `<div class="prose">${md(content)}</div>`;
    }

    div.innerHTML = `
      <div class="ai-header">
        <svg class="ai-icon" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 2L13.7 8.3L20.5 5.8L16.2 11L21.5 14.5L14.9 14.2L13.8 21L10.8 15L4.5 18.5L7.8 12.5L2 9.5L8.7 9.2L12 2Z"/>
        </svg>
        <span class="ai-label">Claude</span>
      </div>`;
    div.appendChild(bodyEl);

    if (!isErr) {
      const acts = document.createElement('div');
      acts.className = 'msg-actions';
      acts.innerHTML = `
        <button class="msg-act-btn copy-resp-btn" title="Copy response">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
          Copy
        </button>
        <button class="msg-act-btn" title="Thumbs up">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"/>
          </svg>
        </button>
        <button class="msg-act-btn" title="Thumbs down">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10 15v4a3 3 0 0 0 3 3l4-9V2H5.72a2 2 0 0 0-2 1.7l-1.38 9a2 2 0 0 0 2 2.3zm7-13h2.67A2.31 2.31 0 0 1 22 4v7a2.31 2.31 0 0 1-2.33 2H17"/>
          </svg>
        </button>`;
      div.appendChild(acts);
    }

    inner.insertBefore(div, document.getElementById(TYPING_IND_ID));
    scrollBottom();
    return { div, bodyEl };
  }

  /* ════════════════════════════════════════════════════════════════════
     TYPING INDICATOR
     ════════════════════════════════════════════════════════════════════ */
  function showTyping() {
    document.getElementById('typing-ind').classList.add('on');
    scrollBottom();
  }
  function hideTyping() {
    document.getElementById('typing-ind').classList.remove('on');
  }

  /* ════════════════════════════════════════════════════════════════════
     SCROLL
     ════════════════════════════════════════════════════════════════════ */
  function scrollBottom() {
    const msgs = document.getElementById('messages');
    if (msgs) requestAnimationFrame(() => { msgs.scrollTop = msgs.scrollHeight; });
  }

  /* ════════════════════════════════════════════════════════════════════
     CONVERSATIONS (SIDEBAR)
     ════════════════════════════════════════════════════════════════════ */
  function createConversation(firstMsg) {
    const id    = 'c_' + Date.now();
    const title = firstMsg.length > 42 ? firstMsg.slice(0, 42) + '…' : firstMsg;
    S.activeConv = id;
    S.convs.unshift({ id, title, messages:[], ts: new Date() });
    renderSidebar();
  }

  function updateActiveConv() {
    const c = S.convs.find(c => c.id === S.activeConv);
    if (c) c.messages = [...S.history];
    document.querySelectorAll('.conv-item').forEach(el => {
      el.classList.toggle('active', el.dataset.id === S.activeConv);
    });
  }

  function loadConversation(id) {
    const c = S.convs.find(x => x.id === id);
    if (!c) return;
    S.activeConv = id;
    S.history    = [...c.messages];

    resetMessagesDOM();
    c.messages.forEach(m => {
      if (m.role === 'user') addUserMsg(m.content);
      else addAIMsg(m.content);
    });

    showChat();
    renderSidebar();
  }

  function renderSidebar() {
    const list  = document.getElementById('conv-list');
    const empty = document.getElementById('conv-empty');
    list.innerHTML = '';

    if (S.convs.length === 0) { empty.style.display = 'block'; return; }
    empty.style.display = 'none';

    const now = new Date();
    const sod = (d) => { const x = new Date(d); x.setHours(0,0,0,0); return x; };
    const tod = sod(now);
    const yest = new Date(tod); yest.setDate(yest.getDate() - 1);
    const lw   = new Date(tod); lw.setDate(lw.getDate() - 7);

    const groups = [
      { label:'Today',           convs: S.convs.filter(c => sod(c.ts) >= tod)  },
      { label:'Yesterday',       convs: S.convs.filter(c => sod(c.ts) >= yest && sod(c.ts) < tod) },
      { label:'Previous 7 days', convs: S.convs.filter(c => sod(c.ts) >= lw && sod(c.ts) < yest)  },
      { label:'Older',           convs: S.convs.filter(c => sod(c.ts) < lw)  },
    ];

    groups.forEach(({ label, convs }) => {
      if (!convs.length) return;
      const gl = document.createElement('div');
      gl.className = 'conv-group-label';
      gl.textContent = label;
      list.appendChild(gl);
      convs.forEach(conv => {
        const item = document.createElement('div');
        item.className = 'conv-item' + (conv.id === S.activeConv ? ' active' : '');
        item.dataset.id = conv.id;
        item.innerHTML = `
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
          <span class="conv-title">${esc(conv.title)}</span>`;
        item.addEventListener('click', () => loadConversation(conv.id));
        list.appendChild(item);
      });
    });
  }

  function resetMessagesDOM() {
    document.getElementById('messages-inner').innerHTML = `
      <div id="typing-ind">
        <div style="width:20px;height:20px;color:var(--accent);">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2L13.7 8.3L20.5 5.8L16.2 11L21.5 14.5L14.9 14.2L13.8 21L10.8 15L4.5 18.5L7.8 12.5L2 9.5L8.7 9.2L12 2Z"/>
          </svg>
        </div>
        <div class="t-dots">
          <div class="t-dot"></div>
          <div class="t-dot"></div>
          <div class="t-dot"></div>
        </div>
      </div>`;
  }

  /* ════════════════════════════════════════════════════════════════════
     CODE COPY  (event delegation)
     ════════════════════════════════════════════════════════════════════ */
  document.addEventListener('click', e => {
    /* Code block copy */
    const ccBtn = e.target.closest('.code-copy');
    if (ccBtn) {
      const code = decodeURIComponent(ccBtn.dataset.code || '');
      navigator.clipboard.writeText(code).then(() => {
        const orig = ccBtn.innerHTML;
        ccBtn.innerHTML = `
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="12" height="12">
            <polyline points="20 6 9 17 4 12"/>
          </svg> Copied!`;
        ccBtn.classList.add('copied');
        setTimeout(() => { ccBtn.innerHTML = orig; ccBtn.classList.remove('copied'); }, 2000);
      }).catch(() => {});
      return;
    }

    /* Copy full response */
    const crBtn = e.target.closest('.copy-resp-btn');
    if (crBtn) {
      const body = crBtn.closest('.msg-ai')?.querySelector('.ai-body');
      if (body) {
        navigator.clipboard.writeText(body.innerText || body.textContent).then(() => {
          toast('Copied to clipboard');
        }).catch(() => {});
      }
    }
  });

  /* ════════════════════════════════════════════════════════════════════
     TOAST
     ════════════════════════════════════════════════════════════════════ */
  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2100);
  }

  /* ════════════════════════════════════════════════════════════════════
     INIT
     ════════════════════════════════════════════════════════════════════ */
  syncModelLabels();
  document.getElementById('welcome-input').focus();
  loadModels({ silent: true }); // fetch the live Claude model list in the background
  </script>

</body>
